<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" href="style2.css">
	<title>Welcome to Anizoo</title>
	<link rel="icon" href="icon.png">
</head>
<body>
	<div class="preload">
        	<div class="logop"
        	>
        		Anizoo<span style="color:darkturquoise">.com</span>
        	</div>
        	<div class="loader-frame"></div>
        	<div class="loader1" id="loader1"></div>
        	<div class="loader2" id="loader2"></div>
<script>
    	(function(){
    		var preload = document.getElementById("preload");
    		var loading = 0;
    		var id = setInterval(frame, 64);

    		function frame(){
    			if (loading == 100){
    				clearInterval(id);
    				window.open("Index.html", "_self");
    			}else {
    				loading = loading + 1;
    				if(loading == 90){
    					preload.style.animation = "fadeout, 1s"
    				}
    			}
    		}
    	})();

    </script>
</body>
</html>
